<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Inter', sans-serif;
  background-color: #000000;
  color: #ffffff;
  line-height: 1.6;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* Header estilo Node.js */
header {
  padding: 2rem 4rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid #333333;
}

.logo h1 {
  font-size: 1.8rem;
  font-weight: 700;
  color: #FFD700; /* Amarillo */
  letter-spacing: -0.5px;
}

.logo a {
  text-decoration: none;
  color: #FFD700;
}

nav {
  display: flex;
  gap: 2.5rem;
}

nav a {
  color: #ffffff;
  text-decoration: none;
  font-weight: 500;
  font-size: 1rem;
  transition: color 0.3s ease;
}

nav a:hover, nav a.active {
  color: #FFD700;
}

/* Login container */
.login-section {
  max-width: 1200px;
  margin: 0 auto;
  padding: 4rem;
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
}

.login-container {
  max-width: 450px;
  width: 100%;
  background: #111111;
  border: 1px solid #333333;
  border-radius: 20px;
  padding: 3rem;
  box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
}

.login-header {
  text-align: center;
  margin-bottom: 2.5rem;
}

.login-header h2 {
  color: #FFD700;
  font-size: 2rem;
  font-weight: 700;
  margin-bottom: 0.5rem;
  letter-spacing: -0.5px;
}

.login-header p {
  color: #999999;
  font-size: 0.95rem;
}

/* User info cuando ya estÃ¡ logueado */
.user-info {
  text-align: center;
  margin-bottom: 2rem;
  padding: 1.5rem;
  background: #1a1a1a;
  border-radius: 12px;
  border: 1px solid #333333;
}

.user-avatar {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  margin-bottom: 1rem;
  border: 3px solid #FFD700;
  object-fit: cover;
}

.user-info h3 {
  color: #FFD700;
  margin-bottom: 0.5rem;
  font-size: 1.3rem;
}

.user-info p {
  color: #999999;
  margin-bottom: 1.5rem;
  font-size: 0.9rem;
  word-break: break-all;
}

.user-info .discord-tag {
  color: #5865F2;
  font-weight: 600;
  margin-bottom: 1rem;
}

.logout-btn {
  background: transparent;
  color: #ff4444;
  border: 1px solid #ff4444;
  padding: 0.8rem 2rem;
  border-radius: 8px;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s ease;
  width: 100%;
}

.logout-btn:hover {
  background: #ff4444;
  color: #ffffff;
}

/* Botones de login */
.login-buttons {
  display: flex;
  flex-direction: column;
  gap: 1rem;
}

.login-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.8rem;
  width: 100%;
  padding: 1rem;
  border: none;
  border-radius: 8px;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s ease;
  background: #1a1a1a;
  color: #ffffff;
  border: 1px solid #333333;
}

.login-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 5px 15px rgba(255, 215, 0, 0.2);
}

.login-btn.discord {
  background: #5865F2;
  border-color: #5865F2;
}

.login-btn.discord:hover {
  background: #4752c4;
  border-color: #4752c4;
}

.login-btn.google {
  background: #ffffff;
  color: #333333;
  border-color: #ffffff;
}

.login-btn.google:hover {
  background: #f0f0f0;
}

.login-btn i {
  font-size: 1.2rem;
}

/* Separador */
.separator {
  display: flex;
  align-items: center;
  text-align: center;
  color: #666666;
  margin: 1.5rem 0;
}

.separator::before,
.separator::after {
  content: '';
  flex: 1;
  border-bottom: 1px solid #333333;
}

.separator span {
  padding: 0 1rem;
  font-size: 0.9rem;
}

/* Mensaje de error */
.error-message {
  background: rgba(255, 68, 68, 0.1);
  color: #ff4444;
  padding: 1rem;
  border-radius: 8px;
  margin-bottom: 1.5rem;
  text-align: center;
  font-size: 0.9rem;
  border: 1px solid #ff4444;
  display: none;
}

.error-message.show {
  display: block;
}

/* Loading spinner */
.loading-spinner {
  display: none;
  text-align: center;
  margin: 2rem 0;
}

.loading-spinner.show {
  display: block;
}

.spinner {
  border: 3px solid #333333;
  border-top: 3px solid #FFD700;
  border-radius: 50%;
  width: 40px;
  height: 40px;
  animation: spin 1s linear infinite;
  margin: 0 auto 1rem;
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

/* Footer */
footer {
  text-align: center;
  padding: 2rem;
  border-top: 1px solid #333333;
  color: #666666;
  font-size: 0.9rem;
}

footer a {
  color: #FFD700;
  text-decoration: none;
}

footer a:hover {
  text-decoration: underline;
}

/* Responsive */
@media (max-width: 768px) {
  header {
    padding: 1.5rem;
    flex-direction: column;
    gap: 1rem;
    text-align: center;
  }

  nav {
    gap: 1.5rem;
  }

  .login-section {
    padding: 2rem;
  }

  .login-container {
    padding: 2rem;
  }
}

/* Animaciones */
@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.login-container {
  animation: fadeIn 0.5s ease;
}
</style>
</head>
<body>

      <button id="googleLogin" class="login-btn google" type="button">

<!-- Firebase SDKs -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import {
    getAuth,
    signInWithPopup,
    GoogleAuthProvider,
    OAuthProvider,
    signOut,
    onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA1s25GbpU-sgSJrqbxqkNLFFWp64z1ObM",
    authDomain: "dominioyalmil.firebaseapp.com",
    databaseURL: "https://dominioyalmil-default-rtdb.firebaseio.com",
    projectId: "dominioyalmil",
    storageBucket: "dominioyalmil.firebasestorage.app",
    messagingSenderId: "1073517122536",
    appId: "1:1073517122536:web:8dfc307dfe7b54b9a18a5d"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  const googleProvider = new GoogleAuthProvider();
  const discordProvider = new OAuthProvider("oidc.discord");

  const userInfoDiv = document.getElementById("userInfo");
  const loginButtonsDiv = document.getElementById("loginButtons");
  const errorMessageDiv = document.getElementById("errorMessage");
  const loadingSpinner = document.getElementById("loadingSpinner");
  const googleBtn = document.getElementById("googleLogin");
  const discordBtn = document.getElementById("discordLogin");

  function setCookie(name, value, days) {
    let expires = "";
    if (days) {
      const date = new Date();
      date.setTime(date.getTime() + days * 24 * 60 * 60 * 1000);
      expires = "; expires=" + date.toUTCString();
    }
    document.cookie = `${name}=${encodeURIComponent(value || "")}${expires}; path=/; SameSite=Lax`;
  }

  function eraseCookie(name) {
    document.cookie = `${name}=; Path=/; Expires=Thu, 01 Jan 1970 00:00:01 GMT; SameSite=Lax`;
  }

  function showLoading(show) {
    loadingSpinner.classList.toggle("show", show);
    googleBtn.disabled = show;
    discordBtn.disabled = show;
  }

  function showError(message) {
    errorMessageDiv.textContent = message;
    errorMessageDiv.classList.add("show");
    setTimeout(() => errorMessageDiv.classList.remove("show"), 5000);
  }

  function mapProvider(user) {
    const providerId = user.providerData?.[0]?.providerId || "";
    if (providerId === "google.com") return "google";
    if (providerId.includes("discord")) return "discord";
    return "firebase";
  }

  function persistUserCookies(userData) {
    setCookie("username", userData.displayName || "Usuario", 7);
    setCookie("userEmail", userData.email || "", 7);
    setCookie("userId", userData.uid || "", 7);
    setCookie("userPhoto", userData.photoURL || "", 7);
    setCookie("userProvider", userData.provider || "firebase", 7);
  }

  function clearUserCookies() {
    eraseCookie("username");
    eraseCookie("userEmail");
    eraseCookie("userId");
    eraseCookie("userPhoto");
    eraseCookie("userProvider");
  }

  function renderUser(user) {
    const provider = mapProvider(user);
    const userData = {
      uid: user.uid,
      displayName: user.displayName || "Usuario",
      email: user.email || "",
      photoURL: user.photoURL || "https://via.placeholder.com/80",
      provider
    };

    persistUserCookies(userData);
    loginButtonsDiv.style.display = "none";
    userInfoDiv.style.display = "block";

    const providerLabel = provider === "discord" ? "Discord" : "Google";
    userInfoDiv.innerHTML = `
      <div class="user-info">
        <img src="${userData.photoURL}" alt="Avatar" class="user-avatar">
        <h3>${userData.displayName}</h3>
        <p>${userData.email}</p>
        <p><small>Proveedor: ${providerLabel}</small></p>
        <button id="logoutBtn" class="logout-btn" type="button">Cerrar sesión</button>
      </div>
    `;

    document.getElementById("logoutBtn").addEventListener("click", handleLogout);
  }

  function renderLoggedOut() {
    loginButtonsDiv.style.display = "block";
    userInfoDiv.style.display = "none";
    userInfoDiv.innerHTML = "";
    clearUserCookies();
  }

  async function loginWithGoogle() {
    try {
      showLoading(true);
      await signInWithPopup(auth, googleProvider);
    } catch (error) {
      console.error("Error Google:", error);
      showError(`No se pudo iniciar sesión con Google: ${error.message}`);
    } finally {
      showLoading(false);
    }
  }

  async function loginWithDiscord() {
    try {
      showLoading(true);
      await signInWithPopup(auth, discordProvider);
    } catch (error) {
      console.error("Error Discord:", error);
      showError(`No se pudo iniciar sesión con Discord: ${error.message}`);
    } finally {
      showLoading(false);
    }
  }

  async function handleLogout() {
    try {
      showLoading(true);
      await signOut(auth);
      renderLoggedOut();
    } catch (error) {
      console.error("Error logout:", error);
      showError("No se pudo cerrar sesión.");
    } finally {
      showLoading(false);
    }
  }

  googleBtn.addEventListener("click", loginWithGoogle);
  discordBtn.addEventListener("click", loginWithDiscord);

  onAuthStateChanged(auth, (user) => {
    if (user) {
      renderUser(user);
    } else {
      renderLoggedOut();
    }
  });
</script>
</body>
