<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Inter', sans-serif;
  background-color: #000000;
  color: #ffffff;
  line-height: 1.6;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* Header estilo Node.js */
header {
  padding: 2rem 4rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid #333333;
}

.logo h1 {
  font-size: 1.8rem;
  font-weight: 700;
  color: #FFD700; /* Amarillo */
  letter-spacing: -0.5px;
}

.logo a {
  text-decoration: none;
  color: #FFD700;
}

nav {
  display: flex;
  gap: 2.5rem;
}

nav a {
  color: #ffffff;
  text-decoration: none;
  font-weight: 500;
  font-size: 1rem;
  transition: color 0.3s ease;
}

nav a:hover, nav a.active {
  color: #FFD700;
}

/* Login container */
.login-section {
  max-width: 1200px;
  margin: 0 auto;
  padding: 4rem;
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
}

.login-container {
  max-width: 450px;
  width: 100%;
  background: #111111;
  border: 1px solid #333333;
  border-radius: 20px;
  padding: 3rem;
  box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
}

.login-header {
  text-align: center;
  margin-bottom: 2.5rem;
}

.login-header h2 {
  color: #FFD700;
  font-size: 2rem;
  font-weight: 700;
  margin-bottom: 0.5rem;
  letter-spacing: -0.5px;
}

.login-header p {
  color: #999999;
  font-size: 0.95rem;
}

/* User info cuando ya está logueado */
.user-info {
  text-align: center;
  margin-bottom: 2rem;
  padding: 1.5rem;
  background: #1a1a1a;
  border-radius: 12px;
  border: 1px solid #333333;
}

.user-avatar {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  margin-bottom: 1rem;
  border: 3px solid #FFD700;
  object-fit: cover;
}

.user-info h3 {
  color: #FFD700;
  margin-bottom: 0.5rem;
  font-size: 1.3rem;
}

.user-info p {
  color: #999999;
  margin-bottom: 1.5rem;
  font-size: 0.9rem;
  word-break: break-all;
}

.user-info .discord-tag {
  color: #5865F2;
  font-weight: 600;
  margin-bottom: 1rem;
}

.logout-btn {
  background: transparent;
  color: #ff4444;
  border: 1px solid #ff4444;
  padding: 0.8rem 2rem;
  border-radius: 8px;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s ease;
  width: 100%;
}

.logout-btn:hover {
  background: #ff4444;
  color: #ffffff;
}

/* Botones de login */
.login-buttons {
  display: flex;
  flex-direction: column;
  gap: 1rem;
}

.login-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.8rem;
  width: 100%;
  padding: 1rem;
  border: none;
  border-radius: 8px;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s ease;
  background: #1a1a1a;
  color: #ffffff;
  border: 1px solid #333333;
}

.login-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 5px 15px rgba(255, 215, 0, 0.2);
}

.login-btn.discord {
  background: #5865F2;
  border-color: #5865F2;
}

.login-btn.discord:hover {
  background: #4752c4;
  border-color: #4752c4;
}

.login-btn.google {
  background: #ffffff;
  color: #333333;
  border-color: #ffffff;
}

.login-btn.google:hover {
  background: #f0f0f0;
}

.login-btn i {
  font-size: 1.2rem;
}

/* Separador */
.separator {
  display: flex;
  align-items: center;
  text-align: center;
  color: #666666;
  margin: 1.5rem 0;
}

.separator::before,
.separator::after {
  content: '';
  flex: 1;
  border-bottom: 1px solid #333333;
}

.separator span {
  padding: 0 1rem;
  font-size: 0.9rem;
}

/* Mensaje de error */
.error-message {
  background: rgba(255, 68, 68, 0.1);
  color: #ff4444;
  padding: 1rem;
  border-radius: 8px;
  margin-bottom: 1.5rem;
  text-align: center;
  font-size: 0.9rem;
  border: 1px solid #ff4444;
  display: none;
}

.error-message.show {
  display: block;
}

/* Loading spinner */
.loading-spinner {
  display: none;
  text-align: center;
  margin: 2rem 0;
}

.loading-spinner.show {
  display: block;
}

.spinner {
  border: 3px solid #333333;
  border-top: 3px solid #FFD700;
  border-radius: 50%;
  width: 40px;
  height: 40px;
  animation: spin 1s linear infinite;
  margin: 0 auto 1rem;
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

/* Footer */
footer {
  text-align: center;
  padding: 2rem;
  border-top: 1px solid #333333;
  color: #666666;
  font-size: 0.9rem;
}

footer a {
  color: #FFD700;
  text-decoration: none;
}

footer a:hover {
  text-decoration: underline;
}

/* Responsive */
@media (max-width: 768px) {
  header {
    padding: 1.5rem;
    flex-direction: column;
    gap: 1rem;
    text-align: center;
  }

  nav {
    gap: 1.5rem;
  }

  .login-section {
    padding: 2rem;
  }

  .login-container {
    padding: 2rem;
  }
}

/* Animaciones */
@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.login-container {
  animation: fadeIn 0.5s ease;
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <a href="index.html"><h1>Pes.com</h1></a>
  </div>
  <nav>
    <a href="index.html">Inicio</a>
    <a href="about.html">Sobre nosotros</a>

<main class="login-section">

    <div id="errorMessage" class="error-message"></div>
    
    <div id="loadingSpinner" class="loading-spinner">
      <div class="spinner"></div>

    <div id="userInfo" style="display: none;">
    </div>

    <div id="loginButtons">
      <button id="discordLogin" class="login-btn discord">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515c-.21.378-.459.903-.628 1.318a18.282 18.282 0 0 0-5.608 0 13.83 13.83 0 0 0-.637-1.318A19.756 19.756 0 0 0 3.68 4.37c-2.796 4.106-3.548 8.107-3.164 11.954a19.91 19.91 0 0 0 6.022 3.022c.486-.658.92-1.36 1.291-2.106a12.71 12.71 0 0 1-2.032-.973c.171-.124.338-.255.5-.391a14.374 14.374 0 0 0 12.385 0c.165.136.332.267.5.391-.64.386-1.32.72-2.033.974.371.746.805 1.448 1.292 2.106a19.84 19.84 0 0 0 6.022-3.022c.45-4.337-.704-8.298-3.166-11.954zM8.02 15.331c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.419 0 1.334-.956 2.419-2.157 2.419zm7.96 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.419 0 1.334-.947 2.419-2.157 2.419z"/>
        </svg>
        Continuar con Discord
      </button>
      
      <div class="separator">
        <span>o</span>

      <button id="googleLogin" class="login-btn google">
        <svg width="20" height="20" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Continuar con Google
      </button>
    </div>
  </div>
</main>

<footer>

<!-- Firebase SDKs -->
<script type="module">
  // Import the functions you need from the SDKs you need
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { 
    getAuth, 
    signInWithPopup, 
    GoogleAuthProvider, 
    signOut,
    onAuthStateChanged,
    OAuthProvider
  } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
  
  // FB
  const firebaseConfig = {
    apiKey: "AIzaSyA1s25GbpU-sgSJrqbxqkNLFFWp64z1ObM",
    authDomain: "dominioyalmil.firebaseapp.com",
    projectId: "dominioyalmil",
    storageBucket: "dominioyalmil.firebasestorage.app",
    messagingSenderId: "1073517122536",
    appId: "1:1073517122536:web:8dfc307dfe7b54b9a18a5d"
  };

  // Initialize Firebase
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // Proveedor de Google
    const googleProvider = new GoogleAuthProvider();
  // Función para login con Discord
  async function loginWithDiscord() {
    showLoading(true);
    
    // CLIENT ID
    const DISCORD_CLIENT_ID = "1480719259158974674";
    
    // Redirect URI
    const REDIRECT_URI = window.location.origin + "/login.html";
    
    // Scopes necesarios
    const SCOPES = ["identify", "email"];
    
    // Construir URL de autorización de Discord
    const discordAuthUrl = new URL("https://discord.com/api/oauth2/authorize");
    discordAuthUrl.searchParams.append("client_id", DISCORD_CLIENT_ID);
    discordAuthUrl.searchParams.append("redirect_uri", REDIRECT_URI);
    discordAuthUrl.searchParams.append("response_type", "code");
    discordAuthUrl.searchParams.append("scope", SCOPES.join(" "));
    
    // Guardar estado para prevenir CSRF
    const state = generateRandomString();
    localStorage.setItem("discord_oauth_state", state);
    discordAuthUrl.searchParams.append("state", state);
    
    // Redirigir a Discord
    window.location.href = discordAuthUrl.toString();
  }
  
  // Función para generar string aleatorio (para state)
  function generateRandomString() {
    return Math.random().toString(36).substring(2, 15) + 
           Math.random().toString(36).substring(2, 15);
  }
  
  // Función para intercambiar código por token
  async function exchangeCodeForToken(code) {
    try {
      
      // Llamada a backend
      const response = await fetch("https://tuservidor.com/api/discord/token", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
        },
        body: JSON.stringify({ code })
      });
      
      if (!response.ok) {
        throw new Error("Error al obtener token de Discord");
      }
      
      const data = await response.json();
      return data.access_token;
    } catch (error) {
      console.error("Error exchanging code:", error);
      throw error;
    }
  }
  
  // Función para obtener datos del usuario de Discord
  async function getDiscordUserData(accessToken) {
    try {
      const response = await fetch("https://discord.com/api/users/@me", {
        headers: {
          Authorization: `Bearer ${accessToken}`
        }
      });
      
      if (!response.ok) {
        throw new Error("Error al obtener datos de usuario");
      }
      
      return await response.json();
    } catch (error) {
      console.error("Error getting user data:", error);
      throw error;
    }
  }
  
  // Verificar si hay código de autorización en la URL
  async function handleDiscordCallback() {
    const urlParams = new URLSearchParams(window.location.search);
    const code = urlParams.get("code");
    const state = urlParams.get("state");
    const savedState = localStorage.getItem("discord_oauth_state");
    
    if (code && state && state === savedState) {
      showLoading(true);
      
      try {
        // Limpiar URL
        window.history.replaceState({}, document.title, window.location.pathname);
        
        // const accessToken = await exchangeCodeForToken(code);
        
        // Por ahora, simulamos un usuario de Discord
        // En producción, esto debe venir de tu backend después de verificar el token
        const discordUser = {
          id: "123456789",
          username: "UsuarioDiscord",
          discriminator: "0000",
          avatar: null,
          email: "usuario@discord.com"
        };
        
        // Guardar en localStorage
        const userData = {
          uid: discordUser.id,
          displayName: discordUser.username + (discordUser.discriminator !== "0" ? "#" + discordUser.discriminator : ""),
          email: discordUser.email,
          photoURL: discordUser.avatar ? 
            `https://cdn.discordapp.com/avatars/${discordUser.id}/${discordUser.avatar}.png` : 
            "https://cdn.discordapp.com/embed/avatars/0.png",
          provider: "discord"
        };
        
        localStorage.setItem("discord_user", JSON.stringify(userData));
        
        // Actualizar UI
        updateUserUI(userData);
        showLoading(false);
        
      } catch (error) {
        console.error("Error en callback de Discord:", error);
        showError("Error al iniciar sesión con Discord");
        showLoading(false);
      }
    }
  }

  // Función para guardar en cookies
  function setCookie(name, value, days) {
    let expires = "";
    if (days) {
      const date = new Date();
      date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
      expires = "; expires=" + date.toUTCString();
    }
    document.cookie = name + "=" + (value || "") + expires + "; path=/; SameSite=Strict";
  }

  function getCookie(name) {
    const nameEQ = name + "=";
    const ca = document.cookie.split(';');
    for(let i = 0; i < ca.length; i++) {
      let c = ca[i];
      while (c.charAt(0) === ' ') c = c.substring(1, c.length);
      if (c.indexOf(nameEQ) === 0) return c.substring(nameEQ.length, c.length);
    }
    return null;
  }

  function eraseCookie(name) {
    document.cookie = name + '=; Path=/; Expires=Thu, 01 Jan 1970 00:00:01 GMT; SameSite=Strict';
  }

  // Elementos del DOM
  const userInfoDiv = document.getElementById('userInfo');
  const loginButtonsDiv = document.getElementById('loginButtons');
  const errorMessageDiv = document.getElementById('errorMessage');
  const loadingSpinner = document.getElementById('loadingSpinner');

  // Función para mostrar/ocultar loading
  function showLoading(show) {
    if (show) {
      loadingSpinner.classList.add('show');
    } else {
      loadingSpinner.classList.remove('show');
    }
  }

  // Función para mostrar error
  function showError(message) {
    errorMessageDiv.textContent = message;
    errorMessageDiv.classList.add('show');
    setTimeout(() => {
      errorMessageDiv.classList.remove('show');
    }, 5000);
  }

  // Función para actualizar UI según estado de autenticación
  function updateUserUI(user) {
    if (user) {
      // Usuario logueado
      loginButtonsDiv.style.display = 'none';
      
      // Guardar nombre en cookies (por 7 días)
      setCookie('username', user.displayName || 'Usuario', 7);
      setCookie('userEmail', user.email || '', 7);
      setCookie('userId', user.uid, 7);
      setCookie('userPhoto', user.photoURL || '', 7);
      setCookie('userProvider', user.provider || 'firebase', 7);
      
      // Mostrar información del usuario
      userInfoDiv.style.display = 'block';
      
      const isDiscord = user.provider === 'discord';
      const discordTag = isDiscord ? `<p class="discord-tag">${user.displayName}</p>` : '';
      
      userInfoDiv.innerHTML = `
        <div class="user-info">
          <img src="${user.photoURL || 'https://via.placeholder.com/80'}" alt="Avatar" class="user-avatar">
          <h3>${user.displayName || 'Usuario'}</h3>
          ${discordTag}
          <p>${user.email || ''}</p>
          <p><small>ID: ${user.uid.substring(0, 10)}...</small></p>
          <button id="logoutBtn" class="logout-btn">Cerrar sesión</button>
        </div>
      `;
      
      // Agregar evento al botón de logout
      document.getElementById('logoutBtn').addEventListener('click', handleLogout);
      
    } else {
      // Usuario no logueado
      loginButtonsDiv.style.display = 'block';
      userInfoDiv.style.display = 'none';
      
      // Limpiar cookies
      eraseCookie('username');
      eraseCookie('userEmail');
      eraseCookie('userId');
      eraseCookie('userPhoto');
      eraseCookie('userProvider');
    }
  }

  // Manejar login con Discord
  document.getElementById('discordLogin').addEventListener('click', () => {
    loginWithDiscord();
  });

  // Manejar login con Google
  document.getElementById('googleLogin').addEventListener('click', async () => {
    try {
      showLoading(true);
      const result = await signInWithPopup(auth, googleProvider);
      console.log('Google login exitoso:', result.user);
      
      const userData = {
        ...result.user,
        provider: 'google'
      };
      
      updateUserUI(userData);
      showLoading(false);
    } catch (error) {
      console.error('Error en Google login:', error);
      showError('Error al iniciar sesión con Google: ' + error.message);
      showLoading(false);
    }
  });

  // Manejar logout
  async function handleLogout() {
    try {
      showLoading(true);
      
      // Cerrar sesión de Firebase
      await signOut(auth);
      
      // Limpiar Discord de localStorage
      localStorage.removeItem('discord_user');
      
      console.log('Logout exitoso');
      updateUserUI(null);
      showLoading(false);
    } catch (error) {
      console.error('Error en logout:', error);
      showError('Error al cerrar sesión');
      showLoading(false);
    }
  }

  // Verificar Discord callback al cargar la página
  window.addEventListener('load', async () => {
    await handleDiscordCallback();
    
    // Verificar si hay usuario de Discord guardado
    const savedDiscordUser = localStorage.getItem('discord_user');
    if (savedDiscordUser) {
      try {
        const userData = JSON.parse(savedDiscordUser);
        updateUserUI(userData);
      } catch (e) {
        console.error('Error parsing saved Discord user:', e);
      }
    }
  });

  // Observador de estado de autenticación de Firebase
  onAuthStateChanged(auth, (user) => {
    if (user) {
      // Usuario de Firebase
      const userData = {
        ...user,
        provider: 'google'
      };
      updateUserUI(userData);
    } else {
      // No hay usuario de Firebase, pero podría haber de Discord
      const discordUser = localStorage.getItem('discord_user');
      if (!discordUser) {
        updateUserUI(null);
      }
    }
  });

  // Smooth scroll para los enlaces internos (anclas)
  document.querySelectorAll('nav a[href^="#"]').forEach(anchor => {
    anchor.addEventListener('click', function(e) {
      e.preventDefault();
      const targetId = this.getAttribute('href');
      const targetElement = document.querySelector(targetId);
      
      if (targetElement) {
        targetElement.scrollIntoView({
          behavior: 'smooth',
          block: 'start'
        });
      }
    });
  });
</script>
</body>
</html>
