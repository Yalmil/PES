<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pes.com</title>
<link rel="icon" href="" type="image/png">
<link rel="canonical" href="https://pes.pages.dev">
<meta name="title" content="Pes.com.">
<meta name="description" content="Propuestas de la comunidad">
<meta property="og:type" content="website">
<meta property="og:title" content="Pes.com">
<meta property="og:description" content="Propuestas de la comunidad">
<meta property="og:image" content="">
<meta property="og:url" content="https://pes.pages.dev">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Pes.com">
<meta name="twitter:description" content="Propuestas de la comunidad">
<meta name="twitter:image" content="">

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Inter', sans-serif;
  background-color: #000000;
  color: #ffffff;
  line-height: 1.6;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

header {
  padding: 2rem 4rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid #333333;
}

.logo h1 {
  font-size: 1.8rem;
  font-weight: 700;
  color: #FFD700;
  letter-spacing: -0.5px;
}

nav {
  display: flex;
  gap: 2.5rem;
}

nav a {
  color: #ffffff;
  text-decoration: none;
  font-weight: 500;
  font-size: 1rem;
  transition: color 0.3s ease;
}

nav a:hover,
nav a.active {
  color: #FFD700;
}

nav a.profile-link {
  display: inline-flex;
  align-items: center;
  justify-content: center;
}

.hero-section {
  max-width: 1200px;
  margin: 0 auto;
  padding: 4rem;
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 4rem;
}

.centered-section {
  text-align: center;
  max-width: 820px;
  margin: 0 auto;
  padding: 2rem;
  opacity: 0;
  transform: translateY(30px);
  transition: all 0.8s ease;
}

.centered-section.visible {
  opacity: 1;
  transform: translateY(0);
}

.hero-title {
  position: static;
  font-size: 4rem;
  font-weight: 700;
  line-height: 1.1;
  letter-spacing: -2px;
  color: #FFD700;
  margin-bottom: 1.2rem;
}

.section-content {
  color: #cccccc;
  font-size: 1.12rem;
}

.section-content .highlight {
  color: #FFD700;
  font-weight: 600;
  margin-bottom: 0.8rem;
}

.auth-status {
  color: #999999;
  margin-top: 1rem;
}

.proposal-btn {
  margin-top: 1.5rem;
  background: #FFD700;
  color: #000000;
  border: 1px solid #FFD700;
  border-radius: 8px;
  padding: 0.85rem 1.5rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.25s ease;
  display: none;
}

.proposal-btn:hover {
  background: #ffe14a;
  transform: translateY(-2px);
}

.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.72);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 999;
  padding: 1rem;
}

.modal-overlay.show {
  display: flex;
}

.proposal-modal {
  width: 100%;
  max-width: 560px;
  background: #111111;
  border: 1px solid #333333;
  border-radius: 14px;
  padding: 1.4rem;
  box-shadow: 0 20px 40px rgba(0, 0, 0, 0.45);
}

.proposal-modal h3 {
  color: #FFD700;
  margin-bottom: 0.8rem;
}

.proposal-modal p {
  color: #b8b8b8;
  margin-bottom: 1rem;
}

.proposal-modal textarea {
  width: 100%;
  min-height: 160px;
  border: 1px solid #333333;
  background: #191919;
  color: #ffffff;
  border-radius: 8px;
  padding: 0.85rem;
  resize: vertical;
  outline: none;
}

.proposal-modal textarea:focus {
  border-color: #FFD700;
}

.modal-actions {
  margin-top: 1rem;
  display: flex;
  gap: 0.8rem;
  justify-content: flex-end;
}

.btn-cancel,
.btn-submit {
  border-radius: 8px;
  padding: 0.75rem 1.1rem;
  font-weight: 600;
  cursor: pointer;
  border: 1px solid #333333;
}

.btn-cancel {
  background: transparent;
  color: #dddddd;
}

.btn-submit {
  background: #FFD700;
  color: #000000;
  border-color: #FFD700;
}

.proposal-feedback {
  margin-top: 0.8rem;
  font-size: 0.95rem;
  min-height: 1.2rem;
}

.proposal-feedback.error {
  color: #ff6666;
}

.proposal-feedback.success {
  color: #7CFC98;
}

footer {
  text-align: center;
  padding: 2rem;
  border-top: 1px solid #333333;
  color: #666666;
  font-size: 0.9rem;
}

footer a {
  color: #FFD700;
  text-decoration: none;
}

footer a:hover {
  text-decoration: underline;
}

@media (max-width: 768px) {
  header {
    padding: 1.5rem;
    flex-direction: column;
    gap: 1rem;
    text-align: center;
  }

  nav {
    gap: 1.5rem;
    flex-wrap: wrap;
    justify-content: center;
  }

  .hero-section {
    padding: 2rem;
  }

  .hero-title {
    font-size: 3rem;
  }

  .centered-section {
    padding: 1rem;
  }
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <h1>Pes.com</h1>
  </div>
  <nav>
    <a href="index.html">Inicio</a>
    <a href="about.html">Sobre nosotros</a>
    <a href="propuestas.html" class="active">Propuestas</a>
    <a href="votaciones.html">Votaciones</a>
    <a href="juegos.html">Juegos</a>
    <a href="lojin.html">Login</a>
  </nav>
</header>

<main class="hero-section">
  <section id="inicio" class="centered-section">
    <h1 class="hero-title">Propuestas</h1>
    <div class="section-content">
      <p class="highlight">Tienes una idea para mejorar el proyecto? Compartela con nosotros.</p>
      <p id="authStatus" class="auth-status">Comprobando sesion...</p>
      <button id="openProposalBtn" class="proposal-btn" type="button">Enviar propuesta</button>
    </div>
  </section>
</main>

<div id="proposalModal" class="modal-overlay" aria-hidden="true">
  <div class="proposal-modal" role="dialog" aria-modal="true" aria-labelledby="proposalModalTitle">
    <h3 id="proposalModalTitle">Enviar propuesta</h3>
    <p>Escribe tu propuesta. Se guardara en la base de datos.</p>
    <textarea id="proposalText" placeholder="Ejemplo: Agregar un sistema de votacion semanal..." maxlength="1200"></textarea>
    <div id="proposalFeedback" class="proposal-feedback"></div>
    <div class="modal-actions">
      <button id="cancelProposalBtn" class="btn-cancel" type="button">Cancelar</button>
      <button id="submitProposalBtn" class="btn-submit" type="button">Enviar</button>
    </div>
  </div>
</div>

<footer>
  © 2026 Yalmil.com - <a href="aviso-legal.html">Aviso legal</a> - <a href="privacidad.html">Privacidad</a>
</footer>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
import { getDatabase, ref, push, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyA1s25GbpU-sgSJrqbxqkNLFFWp64z1ObM",
  authDomain: "dominioyalmil.firebaseapp.com",
  databaseURL: "https://dominioyalmil-default-rtdb.firebaseio.com",
  projectId: "dominioyalmil",
  storageBucket: "dominioyalmil.firebasestorage.app",
  messagingSenderId: "1073517122536",
  appId: "1:1073517122536:web:8dfc307dfe7b54b9a18a5d"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

let currentUser = null;

const sections = document.querySelectorAll("section");
const authStatus = document.getElementById("authStatus");
const openProposalBtn = document.getElementById("openProposalBtn");
const proposalModal = document.getElementById("proposalModal");
const cancelProposalBtn = document.getElementById("cancelProposalBtn");
const submitProposalBtn = document.getElementById("submitProposalBtn");
const proposalText = document.getElementById("proposalText");
const proposalFeedback = document.getElementById("proposalFeedback");
const navLoginLink = document.querySelector('nav a[href="lojin.html"]');

const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add("visible");
    }
  });
}, {
  threshold: 0.2,
  rootMargin: "0px"
});

sections.forEach(section => observer.observe(section));

function setFeedback(message, type = "") {
  proposalFeedback.textContent = message;
  proposalFeedback.className = "proposal-feedback";
  if (type) {
    proposalFeedback.classList.add(type);
  }
}

function openModal() {
  proposalModal.classList.add("show");
  proposalModal.setAttribute("aria-hidden", "false");
  proposalText.focus();
}

function closeModal() {
  proposalModal.classList.remove("show");
  proposalModal.setAttribute("aria-hidden", "true");
  proposalText.value = "";
  setFeedback("");
}

function getCookie(name) {
  const value = `; ${document.cookie}`;
  const parts = value.split(`; ${name}=`);
  if (parts.length === 2) {
    return decodeURIComponent(parts.pop().split(";").shift());
  }
  return "";
}

function updateNavProfile(user) {
  if (!navLoginLink) return;
  if (!navLoginLink.dataset.defaultLabel) {
    navLoginLink.dataset.defaultLabel = navLoginLink.textContent.trim() || "Login";
  }

  const fallbackPhoto = getCookie("userPhoto");
  const photoURL = (user && user.photoURL) || fallbackPhoto;

  if (user && photoURL) {
    navLoginLink.innerHTML = `<img src="${photoURL}" alt="Perfil" style="width:34px;height:34px;border-radius:50%;object-fit:cover;border:2px solid #FFD700;display:block;">`;
    navLoginLink.classList.add("profile-link");
    navLoginLink.setAttribute("aria-label", "Perfil");
  } else {
    navLoginLink.textContent = navLoginLink.dataset.defaultLabel;
    navLoginLink.classList.remove("profile-link");
    navLoginLink.removeAttribute("aria-label");
  }
}

openProposalBtn.addEventListener("click", () => {
  if (!currentUser) {
    window.location.href = "lojin.html";
    return;
  }
  openModal();
});

cancelProposalBtn.addEventListener("click", closeModal);

proposalModal.addEventListener("click", event => {
  if (event.target === proposalModal) {
    closeModal();
  }
});

document.addEventListener("keydown", event => {
  if (event.key === "Escape" && proposalModal.classList.contains("show")) {
    closeModal();
  }
});

submitProposalBtn.addEventListener("click", async () => {
  const propuesta = proposalText.value.trim();

  if (!currentUser) {
    setFeedback("Debes iniciar sesion para enviar propuestas.", "error");
    return;
  }

  if (!propuesta) {
    setFeedback("Escribe una propuesta antes de enviar.", "error");
    return;
  }

  try {
    submitProposalBtn.disabled = true;
    submitProposalBtn.textContent = "Enviando...";
    setFeedback("");

    await push(ref(db, "propuestas"), {
      propuesta,
      uid: currentUser.uid,
      userEmail: currentUser.email || "",
      userName: currentUser.displayName || "Usuario",
      providerId: currentUser.providerData?.[0]?.providerId || "",
      createdAt: serverTimestamp()
    });

    setFeedback("Propuesta enviada correctamente.", "success");
    setTimeout(closeModal, 900);
  } catch (error) {
    console.error("Error al guardar propuesta:", error);
    setFeedback("No se pudo enviar la propuesta. Intenta de nuevo.", "error");
  } finally {
    submitProposalBtn.disabled = false;
    submitProposalBtn.textContent = "Enviar";
  }
});

onAuthStateChanged(auth, user => {
  currentUser = user;
  updateNavProfile(user);

  if (user) {
    authStatus.textContent = `Sesion iniciada como ${user.displayName || user.email || "usuario"}.`;
    openProposalBtn.style.display = "inline-block";
  } else {
    authStatus.innerHTML = 'Inicia sesion en <a href="lojin.html" style="color:#FFD700;">Login</a> para poder enviar propuestas.';
    openProposalBtn.style.display = "none";
  }
});
</script>

</body>
</html>
